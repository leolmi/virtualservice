<!-- OPTIONS -->
<label class="section-label">OPTIONS</label>
<div class="function-options">
  <div class="toggle-col">
    <mat-slide-toggle
      color="accent"
      [checked]="active()"
      [matTooltip]="active() ? 'disable scheduled function' : 'enable scheduled function'"
      (change)="onToggleActive($event.checked)"
    ></mat-slide-toggle>
  </div>

  <div class="interval-col">
    <label class="interval-label">Interval (seconds)</label>
    <input
      class="interval-input"
      type="number"
      min="0"
      max="10000"
      [disabled]="!active()"
      [ngModel]="service()?.interval ?? 0"
      (ngModelChange)="onIntervalChange($event)"
    />
  </div>
</div>

<!-- FUNCTION -->
<label class="section-label">FUNCTION</label>
<div class="service-function">
  <vs-code-editor
    class="fn-editor"
    [value]="service()?.schedulerFn ?? ''"
    (valueChange)="onSchedulerFnChange($event)"
  />
</div>
