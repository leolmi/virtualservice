<!-- OPTIONS -->
<label class="section-label">OPTIONS</label>
<div class="function-options">
  <div class="toggle-col">
    <mat-slide-toggle
      color="accent"
      [checked]="active()"
      [matTooltip]="active() ? 'disable scheduled function' : 'enable scheduled function'"
      (change)="onToggleActive($event.checked)"
    ></mat-slide-toggle>
  </div>

  <div class="interval-col">
    <label class="interval-label">Interval (seconds)</label>
    <input
      class="interval-input"
      type="number"
      min="0"
      max="10000"
      [disabled]="!active()"
      [ngModel]="service()?.interval ?? 0"
      (ngModelChange)="onIntervalChange($event)"
    />
  </div>
</div>

<!-- FUNCTION -->
<label class="section-label function-label">
  FUNCTION (JS)
  <button
    mat-icon-button
    class="help-btn"
    [class.active]="helpOpen()"
    matTooltip="Expression scope help"
    (click)="toggleHelp()">
    <mat-icon>{{ helpOpen() ? 'help' : 'help_outline' }}</mat-icon>
  </button>
</label>
<div class="service-function" [class.with-help]="helpOpen()">
  <vs-code-editor
    class="fn-editor"
    [value]="service()?.schedulerFn ?? ''"
    (valueChange)="onSchedulerFnChange($event)"
  />
  @if (helpOpen()) {
    <vs-expression-help
      class="function-help"
      [context]="helpContext()"
    />
  }
</div>
