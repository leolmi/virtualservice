<!-- DESCRIPTION -->
<label class="section-label">DESCRIPTION</label>
<div class="service-description">
  @if (!editDescription()) {
    @if (service()?.description) {
      <div class="description-rendered" [innerHTML]="service()!.description | markdown"></div>
    } @else {
      <span class="empty-desc">this service has no description</span>
    }
  } @else {
    <textarea
      class="description-editor"
      [ngModel]="service()?.description ?? ''"
      (ngModelChange)="onUpdateDescription($event)"
      placeholder="Write a description (markdown supported)..."
    ></textarea>
  }
  <button
    class="edit-btn"
    mat-icon-button
    [matTooltip]="editDescription() ? 'confirm' : 'edit description'"
    (click)="onToggleEditDescription()"
  >
    <mat-icon>{{ editDescription() ? 'check' : 'edit' }}</mat-icon>
  </button>
</div>

<!-- DATABASE -->
<label class="section-label database-label">
  DATABASE
  <button
    mat-icon-button
    class="help-btn"
    [class.active]="helpOpen()"
    matTooltip="Expression scope help"
    (click)="toggleHelp()">
    <mat-icon>{{ helpOpen() ? 'help' : 'help_outline' }}</mat-icon>
  </button>
</label>
<div class="service-database" [class.with-help]="helpOpen()">
  <div class="dbo-editor-wrap">
    <vs-code-editor
      class="dbo-editor"
      [value]="service()?.dbo ?? ''"
      (valueChange)="onUpdateDbo($event)"
    />

    @if (dboWarning(); as warn) {
      <div class="dbo-warning">
        <mat-icon color="warn" [matTooltip]="warn">warning</mat-icon>
        <span class="dbo-warning-text">{{ warn }}</span>
      </div>
    }
  </div>

  @if (helpOpen()) {
    <vs-expression-help
      class="database-help"
      [context]="helpContext()"
    />
  }
</div>
