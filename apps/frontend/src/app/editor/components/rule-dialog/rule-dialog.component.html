<h2 mat-dialog-title>Rule editor</h2>

<mat-dialog-content>
  <div class="rule-fields">

    <div class="field-row">
      <span class="field-label">Code</span>
      <input
        type="number"
        class="field-input code-input"
        [(ngModel)]="rule.code" />
    </div>

    <div class="field-row">
      <span class="field-label">Error text</span>
      <input
        type="text"
        class="field-input"
        [(ngModel)]="rule.error"
        placeholder="Error message returned to the caller" />
    </div>

    <div class="field-row">
      <span class="field-label">Path</span>
      <input
        type="text"
        class="field-input mono"
        [(ngModel)]="rule.path"
        placeholder="e.g. body.name" />
    </div>

    <div class="field-col">
      <span class="field-label">Validation expression</span>
      <p class="sub-label">
        The rule fires (error is returned) when the expression evaluates to <b>true</b>.
      </p>
      <vs-code-editor
        class="expression-editor"
        [value]="rule.expression"
        (valueChange)="onExpressionChange($event)" />
    </div>

  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="close()">Cancel</button>
  <button mat-button color="accent" (click)="close(true)">Done</button>
</mat-dialog-actions>
