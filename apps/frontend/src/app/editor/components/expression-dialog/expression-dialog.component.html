<div mat-dialog-title class="dialog-title">
  <span>{{ title }}</span>
  @if (helpContext) {
    <button mat-icon-button
      class="help-toggle"
      [class.active]="showHelp()"
      matTooltip="Toggle expression help"
      (click)="toggleHelp()">
      <mat-icon>help_outline</mat-icon>
    </button>
  }
</div>

<mat-dialog-content>
  <div class="dialog-body" [class.with-help]="showHelp()">

    <div class="expression-col">
      <p class="sub-label">
        Expression body (without the leading <b>=</b>). The result of the expression
        is used as the final value.
      </p>
      <vs-code-editor
        class="expression-editor"
        [value]="expression"
        (valueChange)="onExpressionChange($event)" />
    </div>

    @if (showHelp()) {
      <div class="help-col">
        <vs-expression-help [context]="helpContext" />
      </div>
    }

  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="close()">Cancel</button>
  <button mat-button color="accent" (click)="close(true)">Done</button>
</mat-dialog-actions>
